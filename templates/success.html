<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Recorded</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan:       #00D4FF;
    --blue:       #1A6BFF;
    --green:      #00FF88;
    --bg:         #060A14;
    --card:       #0B1120;
    --card-fill:  #0D1826;
    --border:     rgba(0,212,255,0.08);
    --border-hover: rgba(0,212,255,0.20);
    --border-focus: rgba(0,212,255,0.40);
    --text-primary:   #ffffff;
    --text-secondary: rgba(255,255,255,0.85);
    --text-muted:     rgba(255,255,255,0.38);
    --text-label:     rgba(0,212,255,0.60);
    --glow-subtle: 0 0 20px rgba(0,212,255,0.15);
    --glow-hover:  0 0 28px rgba(0,212,255,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,80,255,0.14) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: glowPulse 3s ease-in-out infinite;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: min(420px, 90vw);
    text-align: center;
    position: relative;
    z-index: 2;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: var(--glow-subtle), 0 24px 60px rgba(6,10,20,0.8);
    /* Card top shimmer */
    background-image: linear-gradient(180deg, transparent, rgba(0,212,255,0.035) 40%, transparent);
  }

  .icon-wrap {
    position: relative;
    width: 80px; height: 80px;
    margin: 0 auto 24px;
  }
  .ripple {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,212,255,0.2);
    animation: ripple 1.6s ease-out 0.3s both;
  }
  .ripple2 {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,212,255,0.12);
    animation: ripple 1.6s ease-out 0.55s both;
  }
  .ripple3 {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,212,255,0.06);
    animation: ripple 1.6s ease-out 0.8s both;
  }
  .icon {
    position: relative;
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
    box-shadow: var(--glow-subtle), 0 8px 24px rgba(0,212,255,0.25);
    animation: iconPop 0.5s cubic-bezier(0.34,1.8,0.64,1) 0.2s both;
  }
  .icon svg {
    width: 36px; height: 36px;
    stroke: #fff; fill: none;
    stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 45; stroke-dashoffset: 45;
    animation: drawCheck 0.4s ease 0.45s forwards;
  }

  h1 {
    font-size: 22px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    animation: fadeUp 0.4s ease 0.5s both;
  }
  p {
    font-size: 14px; color: var(--text-muted);
    line-height: 1.6; margin-bottom: 28px;
    animation: fadeUp 0.4s ease 0.6s both;
  }

  .meta {
    background: var(--card-fill);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    text-align: left;
    margin-bottom: 24px;
    display: flex; flex-direction: column; gap: 12px;
    animation: fadeUp 0.4s ease 0.7s both;
  }
  .meta-row { display: flex; justify-content: space-between; font-size: 13px; }
  .meta-row span:first-child { color: var(--text-label); }
  .meta-row span:last-child  { font-weight: 500; color: var(--text-secondary); }
  .verified { color: var(--green) !important; font-weight: 600 !important; }

  .btn {
    display: block; width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 4px 16px rgba(0,212,255,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.4s ease 0.8s both;
  }
  .btn:hover  { transform: translateY(-1px); box-shadow: var(--glow-hover); }
  .btn:active { transform: scale(0.98); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.75); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes iconPop {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }
  @keyframes ripple {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(3.2); opacity: 0; }
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: 0.8; transform: translate(-50%,-50%) scale(1); }
    50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="bg-glow"></div>

<div class="card">
  <div class="icon-wrap">
    <div class="ripple"></div>
    <div class="ripple2"></div>
    <div class="ripple3"></div>
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <h1>Attendance Recorded</h1>
  <p>Your presence has been verified and saved successfully.</p>
  <div class="meta">
    <div class="meta-row"><span>Status</span><span class="verified">✓ Verified</span></div>
    <div class="meta-row"><span>Time</span><span id="ts">—</span></div>
    <div class="meta-row"><span>Session</span><span id="sid">—</span></div>
  </div>
  <button class="btn" onclick="window.history.back()">Done</button>
</div>

<script>
  const now = new Date();
  document.getElementById('ts').textContent =
    now.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) + ', ' +
    now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12: true });
  document.getElementById('sid').textContent =
    '#' + Math.random().toString(36).substring(2,8).toUpperCase();

  // Confetti — LPAF palette
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#00D4FF','#1A6BFF','#00FF88','#ffffff','rgba(0,212,255,0.6)','rgba(0,255,136,0.7)','rgba(26,107,255,0.8)'];
  const pieces = [];
  const cx = canvas.width / 2, cy = canvas.height / 2;

  for (let i = 0; i < 160; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 9;
    pieces.push({
      x: cx, y: cy,
      w: 7 + Math.random() * 7,
      h: 3 + Math.random() * 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      gravity: 0.25,
      opacity: 1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity;
      p.rot += p.rotSpeed;
      p.opacity -= 0.012;
      if (p.opacity <= 0) continue;
      alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
    }
    if (alive) requestAnimationFrame(draw);
  }

  setTimeout(draw, 350);
</script>
</body>
</html>
